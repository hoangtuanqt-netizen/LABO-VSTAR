<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LABO VSTAR</title>
    <script>
      (function() {
        try {
          var originalFetch = window.fetch || globalThis.fetch;
          var activeFetch = originalFetch;
          if (originalFetch) {
            Object.defineProperty(window, 'fetch', {
              get: function() {
                return activeFetch;
              },
              set: function(val) {
                activeFetch = val;
              },
              configurable: true,
              enumerable: true
            });
            if (typeof globalThis !== 'undefined' && globalThis !== window) {
              Object.defineProperty(globalThis, 'fetch', {
                get: function() {
                  return activeFetch;
                },
                set: function(val) {
                  activeFetch = val;
                },
                configurable: true,
                enumerable: true
              });
            }
          }
        } catch (e) {
          console.warn('Failed to patch fetch descriptor:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
